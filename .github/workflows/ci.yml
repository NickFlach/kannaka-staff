name: CI

# CI gates two things: every JS source parses (`node --check`), and the
# node:test suite in tests/ passes (`npm test`). The suite is hermetic —
# it require()s src/index.js, which skips all boot side-effects (no HTTP
# listen, no probe ticks, no NATS/radio/observatory network) and exercises
# the pure decision helpers.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Syntax check all JS sources
        run: |
          set -euo pipefail
          # find -print0 + xargs -0 handles spaces in paths.
          find src bin -type f -name "*.js" -print0 \
            | xargs -0 -n1 node --check
      - name: Run test suite
        run: npm test
