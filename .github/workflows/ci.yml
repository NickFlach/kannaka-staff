name: CI

# kannaka-staff has no test script today — the CI exists to catch
# import errors and JSON malformedness at PR time. Add a real `npm
# test` later and this workflow will pick it up automatically.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Syntax check all JS sources
        run: |
          set -euo pipefail
          # find -print0 + xargs -0 handles spaces in paths.
          find src bin -type f -name "*.js" -print0 \
            | xargs -0 -n1 node --check
      - name: Run npm test if defined
        run: npm test --if-present
